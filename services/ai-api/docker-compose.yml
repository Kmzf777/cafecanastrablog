services:
  ai-api:
    build: .
    container_name: cafe-canastra-ai-api
    restart: unless-stopped
    env_file: .env
    expose:
      - "3100"
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cafe-ai-api.rule=Host(`ai-api.${DOMAIN:-canastrainteligencia.com}`)"
      - "traefik.http.routers.cafe-ai-api.entrypoints=websecure"
      - "traefik.http.routers.cafe-ai-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.cafe-ai-api.loadbalancer.server.port=3100"

networks:
  traefik_public:
    external: true
